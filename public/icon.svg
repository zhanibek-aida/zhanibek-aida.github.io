<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fdf6f3"/>
      <stop offset="1" stop-color="#f0e4dc"/>
    </linearGradient>
    <linearGradient id="gold" x1="60" y1="40" x2="130" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d4b896"/>
      <stop offset="0.5" stop-color="#c9a87a"/>
      <stop offset="1" stop-color="#a67c52"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="42" fill="url(#bg)"/>
  <!-- переплетённые кольца -->
  <ellipse cx="78" cy="98" rx="28" ry="38" stroke="url(#gold)" stroke-width="10" transform="rotate(-12 78 98)"/>
  <ellipse cx="102" cy="98" rx="28" ry="38" stroke="url(#gold)" stroke-width="10" transform="rotate(12 102 98)"/>
  <circle cx="90" cy="72" r="5" fill="url(#gold)" opacity="0.85"/>
</svg>
