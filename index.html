<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на свадьбу</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #d4af37; /* Золотистый */
            --text-color: #333;
            --bg-color: #fffaf0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            padding: 60px 20px;
            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid var(--accent-color);
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            margin: 0;
            color: var(--accent-color);
        }

        .names {
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .details {
            margin: 40px 0;
            line-height: 1.8;
        }

        .date {
            font-size: 1.2rem;
            font-weight: bold;
            border-top: 1px solid #ccc;
            border-bottom: 1px solid #ccc;
            display: inline-block;
            padding: 10px 20px;
            margin: 20px 0;
        }

        .location-map {
            margin-top: 20px;
            border: 2px solid var(--accent-color);
            border-radius: 10px;
            overflow: hidden;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s ease;
            margin-top: 30px;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        @media (max-width: 480px) {
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Wedding Day</h1>
        <div class="names">Жанибек & Аида</div>
    </header>

    <div class="container">
        <section class="intro">
            <p>Дорогие друзья и близкие! Мы будем счастливы, если вы разделите с нами этот особенный день.</p>
        </section>

        <section class="details">
            <div class="date">ЛЕТО 2026 | СУББОТА</div>
            <p><strong>Место встречи:</strong> СКО, пр. Маликов, Ресторанный комплекс Гаухартас</p>
            <p><strong>Сбор гостей:</strong> 17:00</p>
        </section>

        <div class="location-map">
            <img src="https://api.staticmap.co/v1/?center=Astana&zoom=14&size=600x300&key=staticmap_api_key" alt="Карта проезда" style="width:100%;">
        </div>

        <a href="https://forms.gle/your-form-link" target="_blank" class="btn">ПОДТВЕРДИТЬ УЧАСТИЕ</a>

        <footer>
            <p>Будем ждать вас с нетерпением!</p>
        </div>
    </div>

</body>
</html>
